<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Page</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{height:100vh;display:flex;justify-content:center;align-items:center;font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2,#ff6ec7);background-size:300% 300%;animation:bg 8s infinite alternate}.card{background:rgba(255,255,255,.15);backdrop-filter:blur(12px);padding:40px;border-radius:20px;text-align:center;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.3);transition:.3s}.card:hover{transform:translateY(-8px) scale(1.03)}h1{margin-bottom:15px;font-size:2.2rem}p{margin-bottom:20px;line-height:1.6}button{padding:12px 28px;border:none;border-radius:30px;background:#fff;color:#764ba2;font-weight:bold;cursor:pointer;transition:.3s}button:hover{background:#764ba2;color:#fff}@keyframes bg{0%{background-position:left}100%{background-position:right}}
</style>
</head>
<body>
<div class="card">
<h1>Welcome</h1>
<p>A complete HTML page with embedded CSS in a single file.</p>
<button>Get Started</button>
</div>
</body>
</html>
